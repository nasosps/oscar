<!doctype html>
<html lang="el">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Oscar Menu</title>
    <link rel="stylesheet" href="menu-catalog.css?v=8">
  </head>
  <body>
    <div class="ambient" aria-hidden="true"></div>

    <header class="topbar">
      <button class="menu-button" id="menuButton" type="button" aria-label="Άνοιγμα μενού κατηγοριών">
        <span aria-hidden="true">☰</span>
        Menu
      </button>
      <div class="brand">
        <img src="assets/logo.jpg" alt="">
        <div>
          <strong>Oscar</strong>
          <span>Κατάλογος</span>
        </div>
      </div>
      <div class="nav-buttons" aria-label="Αλλαγή κατηγορίας">
        <button class="icon-button" id="backButton" type="button" aria-label="Προηγούμενη κατηγορία">
          <span aria-hidden="true">‹</span>
        </button>
        <button class="icon-button" id="nextButton" type="button" aria-label="Επόμενη κατηγορία">
          <span aria-hidden="true">›</span>
        </button>
      </div>
    </header>

    <a class="home-fab" href="index.html">Αρχική σελίδα</a>

    <main class="shell">
      <section class="hero" aria-labelledby="pageTitle">
        <div>
          <p class="eyebrow" id="pageMeta">Φόρτωση</p>
          <h1 id="pageTitle">Oscar Menu</h1>
        </div>
        <button class="order-pill" id="openOrder" type="button">
          <span>Παραγγελία</span>
          <strong id="orderTotalTop">0,00 €</strong>
        </button>
      </section>

      <section class="controls" aria-label="Φίλτρα">
        <div class="search-wrap">
          <span aria-hidden="true">⌕</span>
          <input id="searchInput" type="search" placeholder="Αναζήτηση">
        </div>
        <div class="category-strip" id="categoryStrip" role="tablist" aria-label="Κατηγορίες"></div>
      </section>

      <section class="stage" aria-live="polite">
        <div class="page-card">
          <div class="page-head">
            <div>
              <span id="categoryCounter"></span>
              <h2 id="categoryTitle"></h2>
            </div>
            <span id="productCount"></span>
          </div>
          <div class="product-grid" id="productGrid"></div>
        </div>
      </section>
    </main>

    <aside class="menu-panel" id="menuPanel" aria-hidden="true">
      <div class="panel-scrim" id="closeMenuScrim"></div>
      <section class="menu-sheet" aria-labelledby="menuTitle">
        <div class="sheet-head">
          <div>
            <span>Γρήγορη επιλογή</span>
            <h2 id="menuTitle">Menu</h2>
          </div>
          <button class="icon-button dark" id="closeMenu" type="button" aria-label="Κλείσιμο">×</button>
        </div>
        <div class="menu-list" id="menuList"></div>
      </section>
    </aside>

    <aside class="order-panel" id="orderPanel" aria-hidden="true">
      <div class="panel-scrim" id="closeOrderScrim"></div>
      <section class="order-sheet" aria-labelledby="orderTitle">
        <div class="sheet-head">
          <div>
            <span>Σύνολο</span>
            <h2 id="orderTitle">Παραγγελία</h2>
          </div>
          <button class="icon-button dark" id="closeOrder" type="button" aria-label="Κλείσιμο">×</button>
        </div>
        <div class="order-items" id="orderItems"></div>
        <div class="order-footer">
          <div class="total-line">
            <span>Πληρωμή</span>
            <strong id="orderTotal">0,00 €</strong>
          </div>
          <div class="order-actions">
            <button class="secondary" id="clearOrder" type="button">Καθαρισμός</button>
            <button class="primary" id="copyOrder" type="button">Αντιγραφή</button>
          </div>
          <div class="order-call">
            <span>Κάλεσε για παραγγελία</span>
            <div class="call-actions">
              <a href="tel:2810861650">Σταθερό<br><strong>281 086 1650</strong></a>
              <a href="tel:6944068248">Vodafone<br><strong>694 406 8248</strong></a>
              <a href="tel:6984984053">Cosmote<br><strong>698 498 4053</strong></a>
            </div>
          </div>
        </div>
      </section>
    </aside>

    <dialog id="extrasDialog" class="extras-dialog">
      <form method="dialog">
        <div class="dialog-head">
          <div>
            <span id="extrasCategory"></span>
            <h2 id="extrasTitle"></h2>
          </div>
          <button class="icon-button dark" value="cancel" aria-label="Κλείσιμο">×</button>
        </div>
        <div id="extrasBody" class="extras-body"></div>
        <div class="dialog-footer">
          <button class="secondary" value="cancel">Άκυρο</button>
          <button class="primary" id="addWithExtras" value="default">Προσθήκη</button>
        </div>
      </form>
    </dialog>

    <div class="toast" id="toast" role="status"></div>

    <script src="oscar_menu_catalog_data.js?v=8"></script>
    <script src="menu-catalog.js?v=8"></script>
  </body>
</html>
